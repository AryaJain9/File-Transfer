<!--
Run this in terminal to serve frontend:
cd frontend
npx serve -l 3000 --single
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>File Share</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
    }
    h2 {
      color: #333;
    }
    button {
      padding: 8px 16px;
      margin-top: 10px;
      background-color: #007bff;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h2>Upload File</h2>
  <input type="file" id="fileInput" />
  <button onclick="upload()">Upload</button>

  <h2>Available Files</h2>
  <ul id="fileList"></ul>

  <script>
    // Backend location. Edit `frontend/user.json` and set the `ip` field to
    // point this page at a backend on another machine. All of these work:
    //   "192.168.1.20"            -> http://192.168.1.20:8000  (port defaulted)
    //   "192.168.1.20:9000"       -> http://192.168.1.20:9000
    //   "http://192.168.1.20:8000"-> used as-is
    // Leave it empty to use localhost.
    //
    // NOTE: user.json is served alongside this page, NOT by the backend --
    // fetching it from the backend would mean already knowing the backend URL.
    const DEFAULT_PORT = 8000;
    let BACKEND_URL = `http://localhost:${DEFAULT_PORT}`;

    // Turn whatever the user typed into a usable origin.
    function buildBackendUrl(raw) {
      let value = String(raw).trim().replace(/\/+$/, ''); // drop trailing slashes
      if (!value) return null;
      if (!/^https?:\/\//i.test(value)) value = `http://${value}`;
      const url = new URL(value);
      if (!url.port && url.protocol === 'http:') url.port = DEFAULT_PORT;
      return url.origin;
    }

    // Kick everything off once we know where the backend lives.
    const ready = fetch('./user.json')
      .then(r => (r.ok ? r.json() : {}))
      .then(cfg => {
        const resolved = cfg && cfg.ip ? buildBackendUrl(cfg.ip) : null;
        if (resolved) BACKEND_URL = resolved;
      })
      .catch(err => {
        console.warn('Could not read user.json, using default:', err);
      })
      .then(() => {
        console.log('BACKEND_URL:', BACKEND_URL);
        loadFiles();
      });


    async function upload() {
      // If the user clicks before user.json has loaded, wait for it -- otherwise
      // the upload would fire at localhost even though an ip is configured.
      await ready;

      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('Select a file first.');

      const formData = new FormData();
      formData.append('file', file);

      try {
        console.log('Uploading to:', `${BACKEND_URL}/api/files/upload`);
        const res = await fetch(`${BACKEND_URL}/api/files/upload`, {
          method: 'POST',
          body: formData
        });

        if (!res.ok) {
          const errData = await res.json();
          alert('Upload failed: ' + (errData.message || res.statusText));
          return;
        }

        const data = await res.json();
        alert(data.message);
        loadFiles();
      } catch (err) {
        console.error('Upload error:', err);
        alert('Upload failed: ' + err.message);
      }
    }

    async function loadFiles() {
      try {
        console.log('Loading files from:', `${BACKEND_URL}/api/files`);
        const res = await fetch(`${BACKEND_URL}/api/files`);
        
        if (!res.ok) {
          console.error('Failed to load files:', res.status, res.statusText);
          return;
        }
        
        const files = await res.json();
        const ul = document.getElementById('fileList');
        ul.innerHTML = '';
        
        if (!Array.isArray(files) || files.length === 0) {
          ul.innerHTML = '<li>No files uploaded yet</li>';
          return;
        }
        
        files.forEach(name => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${BACKEND_URL}/uploads/${name}" target="_blank">${name}</a>`;
          ul.appendChild(li);
        });
      } catch (err) {
        console.error('Error loading files:', err);
      }
    }
  </script>
</body>
</html>
