<!--
Run this in terminal to serve frontend:
cd frontend
npx serve -l 3000 --single
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>File Share</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
    }
    h2 {
      color: #333;
    }
    button {
      padding: 8px 16px;
      margin-top: 10px;
      background-color: #007bff;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h2>Upload File</h2>
  <input type="file" id="fileInput" />
  <button onclick="upload()">Upload</button>

  <h2>Available Files</h2>
  <ul id="fileList"></ul>

  <script>
    // Determine backend URL. The user can edit the root-level user.json file
    // (same directory as this frontend folder) and set an `ip` field. If that
    // value is non-empty we'll use it; otherwise default to localhost.
    let BACKEND_URL = 'http://localhost:8000';
    console.log('Initial BACKEND_URL:', BACKEND_URL);
    fetch(`${BACKEND_URL}/user.json`)
      .then(r => r.json())
      .then(cfg => {
        if (cfg.ip && cfg.ip.trim()) {
          BACKEND_URL = `http://${cfg.ip.trim()}`;
          console.log('Updated BACKEND_URL from user.json:', BACKEND_URL);
        }
        loadFiles(); // Load files after determining URL
      })
      .catch(err => {
        console.warn('Could not fetch user.json, using default:', err);
        loadFiles(); // Continue with default
      });


    async function upload() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('Select a file first.');

      const formData = new FormData();
      formData.append('file', file);

      try {
        console.log('Uploading to:', `${BACKEND_URL}/api/files/upload`);
        const res = await fetch(`${BACKEND_URL}/api/files/upload`, {
          method: 'POST',
          body: formData
        });

        if (!res.ok) {
          const errData = await res.json();
          alert('Upload failed: ' + (errData.message || res.statusText));
          return;
        }

        const data = await res.json();
        alert(data.message);
        loadFiles();
      } catch (err) {
        console.error('Upload error:', err);
        alert('Upload failed: ' + err.message);
      }
    }

    async function loadFiles() {
      try {
        console.log('Loading files from:', `${BACKEND_URL}/api/files`);
        const res = await fetch(`${BACKEND_URL}/api/files`);
        
        if (!res.ok) {
          console.error('Failed to load files:', res.status, res.statusText);
          return;
        }
        
        const files = await res.json();
        const ul = document.getElementById('fileList');
        ul.innerHTML = '';
        
        if (!Array.isArray(files) || files.length === 0) {
          ul.innerHTML = '<li>No files uploaded yet</li>';
          return;
        }
        
        files.forEach(name => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${BACKEND_URL}/uploads/${name}" target="_blank">${name}</a>`;
          ul.appendChild(li);
        });
      } catch (err) {
        console.error('Error loading files:', err);
      }
    }
  </script>
</body>
</html>
